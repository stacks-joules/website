[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Security headers for every page. All assets (scripts, styles, fonts,
# images) are self-hosted and external references are plain links, so a
# same-origin CSP is safe. 'unsafe-inline' is required for Astro's inline
# theme script and island styles; tighten to hashes if those ever move to
# external files.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

# Fonts are content-stable and referenced by fixed filenames, so cache them
# hard. Keeps the browser from re-fetching/revalidating fonts on every
# navigation (a source of flicker). Bump the filename if a font's bytes change.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
